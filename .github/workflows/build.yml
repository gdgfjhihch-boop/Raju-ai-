name: AI Player Build 🚀
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm cache clean --force
          npm install --legacy-peer-deps
          npx expo install --fix

      - name: Fresh Expo Prebuild
        run: |
          rm -rf android
          echo "module.exports = function(api) { api.cache(true); return { presets: ['babel-preset-expo'] }; };" > babel.config.js
          echo '{ "expo": { "name": "RajuAI", "slug": "raju-ai", "version": "1.0.0", "android": { "package": "com.raju.ai", "adaptiveIcon": { "backgroundColor": "#ffffff" } } } }' > app.json
          npx expo prebuild --platform android --clean

      - name: Fix Gradle Paths
        run: |
          echo "reactNativeDir=../node_modules/react-native" >> android/gradle.properties
          echo "reactNativeNodeModulesDir=../node_modules" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx4096m" >> android/gradle.properties

      - name: Build Android App (APK)
        run: |
          cd android
          chmod +x gradlew
          NODE_BIN=$(which node)
          ./gradlew assembleDebug --no-daemon -PnodeExecutableAndArgs="$NODE_BIN"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raju-ai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
