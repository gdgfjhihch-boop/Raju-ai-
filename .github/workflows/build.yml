name: AI Player Build 🚀
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json android
          npm install
          npx expo install --fix

      - name: Fresh Expo Prebuild
        run: |
          echo "module.exports = function(api) { api.cache(true); return { presets: ['babel-preset-expo'] }; };" > babel.config.js
          echo '{ "expo": { "name": "RajuAI", "slug": "raju-ai", "version": "1.0.0", "android": { "package": "com.raju.ai", "adaptiveIcon": { "backgroundColor": "#ffffff" } } } }' > app.json
          npx expo prebuild --platform android --clean

      - name: Fix Node Executable Path for Gradle
        run: |
          NODE_BIN=$(which node)
          find android -name "*.gradle" -type f -exec sed -i "s|\\[\"node\",|\\[\"${NODE_BIN}\",|g" {} +
          find android -name "*.gradle" -type f -exec sed -i "s|'node',|'${NODE_BIN}',|g" {} +
          echo "REACT_NATIVE_DIR=${GITHUB_WORKSPACE}/node_modules/react-native" >> android/gradle.properties
          echo "reactNativeDir=${GITHUB_WORKSPACE}/node_modules/react-native" >> android/gradle.properties

      - name: Build Android App (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4096m

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raju-ai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
