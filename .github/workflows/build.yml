name: AI Player Build 🚀
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npm install @react-native-community/cli@latest babel-preset-expo@latest --save-dev
          npx expo install expo-asset
          npx expo install --fix

      - name: Configure Babel and Bundle Assets
        run: |
          echo "module.exports = function(api) { api.cache(true); return { presets: ['babel-preset-expo'] }; };" > babel.config.js
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file App.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res --reset-cache

      - name: Build Android App (APK)
        run: |
          cd android
          rm -rf build/
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4096m

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raju-ai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
