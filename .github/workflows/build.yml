name: AI Player Build 🚀
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install
          npx expo install --fix

      - name: Fresh Expo Prebuild
        run: |
          # पुराने कचरे को पूरी तरह साफ करना
          rm -rf android
          echo "module.exports = function(api) { api.cache(true); return { presets: ['babel-preset-expo'] }; };" > babel.config.js
          
          # एक प्रॉपर app.json बनाना
          echo '{ "expo": { "name": "RajuAI", "slug": "raju-ai", "version": "1.0.0", "android": { "package": "com.raju.ai", "adaptiveIcon": { "backgroundColor": "#ffffff" } } } }' > app.json
          
          # बिल्कुल नया Android फोल्डर जनरेट करना
          npx expo prebuild --platform android --no-install

      - name: Build Android App (APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4096m

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raju-ai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
