name: AI Player Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm cache clean --force
          npm install
          npx expo install --fix

      - name: Fresh Expo Prebuild
        run: |
          rm -rf android
          echo "module.exports = function(api) { api.cache(true); return { presets: ['babel-preset-expo'] }; };" > babel.config.js
          echo '{ "expo": { "name": "RajuAI", "slug": "raju-ai", "version": "1.0.0", "android": { "package": "com.raju.ai" } } }' > app.json
          npx expo prebuild --platform android --clean

      - name: Force Node Paths in Gradle
        run: |
          NODE_BIN=$(which node)
          sed -i "s|\"node\"|\"$NODE_BIN\"|g" android/app/build.gradle
          sed -i "s|'node'|'$NODE_BIN'|g" android/app/build.gradle
          sed -i "s|\"node\"|\"$NODE_BIN\"|g" android/settings.gradle || true
          sed -i "s|'node'|'$NODE_BIN'|g" android/settings.gradle || true

      - name: Build Android App (APK)
        run: |
          export NODE_PATH=${GITHUB_WORKSPACE}/node_modules
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs=-Xmx4096m

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: raju-ai-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
