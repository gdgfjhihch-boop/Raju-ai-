name: Raju AI Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Expo and EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

            - name: Apply Double Shield
        run: |
          node fix-build.js
          node patch-llama.js
          
          # RAJU AI DIRECT FIX: Force entry file directly into build.gradle
          sed -i 's/apply plugin: "com.android.application"/apply plugin: "com.android.application"\nproject.ext.react = [ entryFile: "node_modules\/expo\/AppEntry.js", root: "\.\.\/\.\." ]/g' android/app/build.gradle
          
